<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <script type="text/javascript" src="/homey.js" id="homey-api"></script>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; padding: 10px; color: #333; margin: 0; }
    .picker-container { background: #f5f5f7; border: 1px solid #e5e5ea; border-radius: 8px; padding: 15px; margin-bottom: 15px; }
    h4 { margin-top: 0; margin-bottom: 10px; color: #111; }
    label { font-weight: bold; display: block; margin-top: 12px; margin-bottom: 4px; font-size: 13px; color: #555; }
    select { width: 100%; padding: 10px; font-size: 15px; border: 1px solid #ccc; border-radius: 6px; background: #fff; appearance: none; -webkit-appearance: none; }
    select:disabled { background: #e5e5ea; color: #8e8e93; cursor: not-allowed; }
    .info-note { font-size: 12px; color: #8e8e93; margin-top: 8px; font-style: italic; }
  </style>
</head>
<body>

  <div class="picker-container">
    <h4>Automated Reflection Picker</h4>
    <p style="font-size: 13px; margin: 0 0 10px 0; color: #666;">Use these dropdowns to automatically populate the manual configuration fields above.</p>

    <label for="dev-select">1. Source Device:</label>
    <select id="dev-select">
      <option value="">Querying system device registry...</option>
    </select>

    <label for="cap-select">2. Capability to Mirror:</label>
    <select id="cap-select" disabled>
      <option value="">-- Choose a device first --</option>
    </select>
    
    <div class="info-note">Selecting options here will instantly sync your configuration profiles. Make sure to click the standard Homey "Save" checkmark at the top when finished.</div>
  </div>

  <script type="application/javascript">
    const devSelect = document.getElementById('dev-select');
    const capSelect = document.getElementById('cap-select');
    let devicesCache = {};
    let activeHomeyAPI = null;

    window.onHomeyReady = function(HomeyInstance) {
      activeHomeyAPI = HomeyInstance || window.Homey;

      activeHomeyAPI.loadScript('/manager/api/api.js', function(err) {
        if (err) return alert('Failed to load Web API client: ' + err);

        activeHomeyAPI.getApiToken(function(err, token) {
          if (err) return alert('Token retrieval failed: ' + err);

          const api = new window.WebApiAppClass({ token: token });

          // Fetch every single device installed in the user's smart home
          api.devices.getDevices()
            .then(function(devices) {
              devicesCache = devices;
              devSelect.innerHTML = '<option value="" selected disabled>-- Select Source Device --</option>';
              
              Object.keys(devices).forEach(key => {
                const dev = devices[key];
                
                // Prevent proxy loop by skipping own driver instances
                if (dev.driverId === 'power-integrator') return;

                const option = document.createElement('option');
                option.value = dev.id;
                option.text = dev.name + (dev.zoneName ? ' [' + dev.zoneName + ']' : '');
                devSelect.add(option);
              });
            })
            .catch(err => alert('Error parsing device ecosystem: ' + err.message));
        });
      });

      // Handle Device Selection Change
      devSelect.addEventListener('change', function() {
        const selectedId = devSelect.value;
        const targetDevice = devicesCache[selectedId];
        
        capSelect.innerHTML = '';
        capSelect.disabled = false;

        if (!targetDevice || !targetDevice.capabilities) return;

        // Isolate telemetry measurement capabilities
        const measurements = targetDevice.capabilities.filter(cap => cap.startsWith('measure_'));
        
        if (measurements.length === 0) {
          const option = document.createElement('option');
          option.text = 'No valid measurements found on this device';
          option.disabled = true;
          capSelect.add(option);
          capSelect.disabled = true;
          return;
        }

        capSelect.innerHTML = '<option value="" selected disabled>-- Select Metric --</option>';
        measurements.forEach(cap => {
          const option = document.createElement('option');
          option.value = cap;
          option.text = cap.replace('measure_', '').replace('_', ' ').toUpperCase();
          capSelect.add(option);
        });
      });

      // Handle Capability Selection Change -> Push data live into input elements above
      capSelect.addEventListener('change', function() {
        const targetUuid = devSelect.value;
        const targetCapability = capSelect.value;

        if (!targetUuid || !targetCapability) return;

        const updatedSettings = {
          "reflected_device_id": targetUuid,
          "reflected_capability_id": targetCapability
        };

        // Instantly synchronizes the text boxes on the mobile screen
        activeHomeyAPI.setSettings(updatedSettings, function(err, result) {
          if (err) console.error('Failed to update field state:', err);
        });
      });
    };
  </script>
</body>
</html>
