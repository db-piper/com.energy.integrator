<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <script type="text/javascript" src="/homey.js" id="homey-api"></script>
</head>
<body>
  <p>Select the device you want to integrate:</p>
  <select id="device-dropdown">
    <option value="" disabled selected>Loading devices...</option>
  </select>

  <script type="application/javascript">
    // 1. Fire immediately on script execution
    Homey.emit('get_system_devices', null)
      .then(function(devices) {
        const dropdown = document.getElementById('device-dropdown');
        dropdown.innerHTML = '';

        devices.forEach(device => {
          const option = document.createElement('option');
          option.value = device.id;
          option.text = device.name;
          dropdown.add(option);
        });
      })
      .catch(function(err) {
        Homey.alert('Error loading devices: ' + err.message);
      });

    // 2. Navigation click handler
    Homey.on('next', function(isActive, next) {
      const selectedId = document.getElementById('device-dropdown').value;
      if (!selectedId) return Homey.alert('Please select a device');

      Homey.emit('save_selected_device', selectedId)
        .then(function() {
          next(); // Moves to the next view ID in compose.json
        })
        .catch(function(err) {
          Homey.alert(err.message);
        });
    });
  </script>
</body>
</html>
