<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <script type="text/javascript" src="/homey.js" id="homey-api"></script>
</head>
<body>
  <p>Select the capability you want to reflect:</p>
  <select id="capability-dropdown">
    <option value="" disabled selected>Loading capabilities...</option>
  </select>

  <script type="application/javascript">
    // 1. Fire immediately on script execution
    Homey.emit('get_target_capabilities', null)
      .then(function(capabilities) {
        const dropdown = document.getElementById('capability-dropdown');
        dropdown.innerHTML = '';

        capabilities.forEach(cap => {
          const option = document.createElement('option');
          option.value = cap;
          option.text = cap.replace('_', ' ').toUpperCase();
          dropdown.add(option);
        });
      })
      .catch(function(err) {
        Homey.alert('Error loading capabilities: ' + err.message);
      });

    // 2. Intercept next button, instantiate device, and exit pairing
    Homey.on('next', function(isActive, next) {
      const selectedCapability = document.getElementById('capability-dropdown').value;
      if (!selectedCapability) return Homey.alert('Please select a metric');

      Homey.emit('create_integrator_device', selectedCapability)
        .then(function(deviceDefinition) {
          // Native SDK method to register your virtual device definition
          return Homey.createDevice(deviceDefinition);
        })
        .then(function(result) {
          // Clean exit closing out the modal wrapper entirely
          Homey.done();
        })
        .catch(function(err) {
          Homey.alert('Failed to create device: ' + err.message);
        });
    });
  </script>
</body>
</html>
