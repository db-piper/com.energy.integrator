<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      padding: 15px;
      margin: 0;
      background-color: #f8f9fa;
      color: #333;
    }
    .container {
      background: #ffffff;
      border: 1px solid #e9ecef;
      border-radius: 12px;
      padding: 20px;
      box-shadow: 0 4px 6px rgba(0,0,0,0.02);
      max-width: 400px;
      margin: 0 auto;
    }
    h3 {
      margin-top: 0;
      margin-bottom: 20px;
      font-size: 18px;
      color: #111;
    }
    .form-group {
      margin-bottom: 18px;
    }
    label {
      display: block;
      font-weight: 600;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: #6c757d;
      margin-bottom: 6px;
    }
    select {
      width: 100%;
      padding: 10px 12px;
      font-size: 14px;
      border-radius: 8px;
      border: 1px solid #ced4da;
      background-color: #fff;
      box-sizing: border-box;
      outline: none;
      transition: border-color 0.15s ease-in-out;
    }
    select:focus {
      border-color: #007bff;
    }
    select:disabled {
      background-color: #e9ecef;
      color: #6c757d;
    }
    .actions {
      text-align: right;
      margin-top: 24px;
    }
    button {
      background-color: #eee;
      border: none;
      color: #333;
      padding: 10px 18px;
      font-size: 14px;
      font-weight: 500;
      border-radius: 6px;
      cursor: pointer;
      transition: background-color 0.2s;
    }
    button.primary {
      background-color: #007bff;
      color: white;
    }
    button.primary:hover {
      background-color: #0056b3;
    }
    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
  </style>
</head>
<body>

<div class="container">
  <h3>Automated Reflection Picker</h3>
  
  <div class="form-group">
    <label for="device-select">1. Source Device:</label>
    <select id="device-select" disabled>
      <option>Loading ecosystem devices...</option>
    </select>
  </div>

  <div class="form-group">
    <label for="capability-select">2. Capability to Mirror:</label>
    <select id="capability-select" disabled>
      <option>-- Choose a device first --</option>
    </select>
  </div>

  <div class="actions">
    <button id="save-btn" class="primary" disabled>Save & Close</button>
  </div>
</div>

<script>
  let systemLandscape = {};
  let targetIntegratorId = null;

  function onHomeyReady(Homey) {
    const deviceSelect = document.getElementById('device-select');
    const capabilitySelect = document.getElementById('capability-select');
    const saveBtn = document.getElementById('save-btn');

    // Adjust sizes to match frame bounds natively
    Homey.ready();

    // Step 1: Query backend identity session context
    Homey.emit('get_current_repair_device', {})
      .then(function(currentDevice) {
        if (!currentDevice || !currentDevice.id) {
          throw new Error("Missing target integrator context profile matching token.");
        }
        targetIntegratorId = currentDevice.id;
        
        // Step 2: Grab the alphabetized registry map configuration
        return Homey.emit('get_system_devices', {});
      })
      .then(function(devicesPayload) {
        systemLandscape = devicesPayload;
        
        // Clear out the loading indicators
        deviceSelect.innerHTML = '<option value="">-- Select a Target Device --</option>';
        deviceSelect.disabled = false;

        // Fill the dropdown options cleanly with zone grouped metadata strings
        Object.values(systemLandscape).forEach(function(d) {
          const opt = document.createElement('option');
          opt.value = d.id;
          opt.textContent = d.name + ' (' + d.zoneName + ')';
          deviceSelect.appendChild(opt);
        });

        // Register dynamic mutation cascade listeners
        deviceSelect.addEventListener('change', function() {
          const selectedId = deviceSelect.value;
          capabilitySelect.innerHTML = '<option value="">-- Choose a Capability --</option>';
          
          if (!selectedId || !systemLandscape[selectedId]) {
            capabilitySelect.disabled = true;
            saveBtn.disabled = true;
            return;
          }

          const capabilities = systemLandscape[selectedId].capabilities || [];
          capabilities.forEach(function(cap) {
            const opt = document.createElement('option');
            opt.value = cap.id;
            opt.textContent = cap.title;
            capabilitySelect.appendChild(opt);
          });

          capabilitySelect.disabled = false;
          saveBtn.disabled = false;
        });
      })
      .catch(function(err) {
        console.error("Initialization pipeline breakdown:", err);
        deviceSelect.innerHTML = '<option>Error retrieving initialization data</option>';
        deviceSelect.disabled = true;
      });

    // Step 3: Handle execution commits back across the session link
    saveBtn.addEventListener('click', function() {
      saveBtn.disabled = true;
      saveBtn.textContent = 'Saving...';

      const payload = {
        target_integrator_id: targetIntegratorId,
        reflected_device_id: deviceSelect.value,
        reflected_capability_id: capabilitySelect.value
      };

      Homey.emit('save_reflection_settings', payload)
        .then(function() {
          // Tell the Homey environment the step is finished so it shuts down the iframe
          Homey.done();
        })
        .catch(function(saveErr) {
          alert('Failed to save settings variations: ' + saveErr);
          saveBtn.disabled = false;
          saveBtn.textContent = 'Save & Close';
        });
    });
  }

  // Bind the entry point framework execution
  if (window.Homey) {
    onHomeyReady(window.Homey);
  } else {
    window.onHomeyReady = onHomeyReady;
  }
</script>

</body>
</html>
