<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8">
  <link rel="stylesheet" href="/app/com.energy.integrator/assets/css/app.css">
</head>

<body>

  <div class="picker-wrapper">
    <h1 class="homey-title">Device and Capability Chooser</h1>
    <p class="homey-subtitle">Choose a <b>Device</b> and <b>Capability</b> to be the <b>Power Source</b> for this
      Integrator.</p>

    <div class="form-group">
      <label class="homey-label" for="dev-select">1. Source Device</label>
      <select id="dev-select" class="homey-select">
        <option value="">Querying available devices...</option>
      </select>
    </div>

    <div class="form-group">
      <label class="homey-label" for="cap-select">2. Source Capability</label>
      <select id="cap-select" class="homey-select" disabled>
        <option value="">-- Choose a device first --</option>
      </select>
    </div>

    <div class="toggle-group">
      <input type="checkbox" id="filter-toggle" class="toggle-input">
      <label for="filter-toggle" class="toggle-label">Show only measure.power
        capabilities</label>
    </div>

    <div class="action-bar">
      <button id="btn-close" class="homey-button-primary" disabled>Save & Close</button>
      <div id="status-text" class="status-toast">Configuration committed successfully!</div>
    </div>
  </div>

  <script type="text/javascript">
    // 1. The DOM elements are the only true global constants
    const devSelect = document.getElementById('dev-select');
    const capSelect = document.getElementById('cap-select');
    const btnClose = document.getElementById('btn-close');
    const statusText = document.getElementById('status-text');
    const filterToggle = document.getElementById('filter-toggle'); // Cached element

    function initPicker() {
      if (typeof window.Homey === 'undefined') {
        setTimeout(initPicker, 50);
        return;
      }

      if (typeof window.Homey.ready === 'function') {
        window.Homey.ready();
      }

      // 2. Define the re-runnable landscape loading function
      function loadSystemLandscape(savedDeviceId = null, savedCapId = null) {
        const strictModeActive = filterToggle.checked;

        // Sequence Step 1: Always grab the current repair device settings first
        window.Homey.emit('get_current_repair_device', {})
          .then(function (identity) {

            // Sequence Step 2: Now we can safely calculate our current IDs
            const currentDeviceId = savedDeviceId || identity.reflected_device_id;
            const currentCapId = savedCapId || identity.reflected_capability_id;

            // Sequence Step 3: Pass those active IDs straight to the registry fetch
            return window.Homey.emit('get_system_devices', {
              strict: strictModeActive,
              currentDeviceId: currentDeviceId,
              currentCapabilityId: currentCapId
            })
              .then(function (devicesCache) {
                // Package both results together so your existing UI rendering block works unchanged
                return [identity, devicesCache];
              });
          })
          .then(function (results) {
            const identity = results[0];
            const devicesCache = results[1];
            const activeIntegratorId = identity.id;

            // Re-calculate local references for the UI population logic block
            const currentDeviceId = savedDeviceId || identity.reflected_device_id;
            const currentCapId = savedCapId || identity.reflected_capability_id;

            // 3. Populate Device Dropdown
            devSelect.innerHTML = '<option value="" selected disabled>-- Select Source Device --</option>';
            Object.keys(devicesCache).forEach(id => {
              const dev = devicesCache[id];
              const option = document.createElement('option');
              option.value = dev.id;
              option.text = dev.name + ` [${dev.zoneName}]`;

              if (currentDeviceId && dev.id === currentDeviceId) {
                option.selected = true;
              }
              devSelect.add(option);
            });

            // 4. Cascade Trigger if valid config exists
            if (currentDeviceId && devicesCache[currentDeviceId]) {
              populateCapabilities(devicesCache, currentDeviceId, currentCapId);
              btnClose.disabled = false;
            } else {
              capSelect.innerHTML = '<option value="" selected disabled>-- Choose a device first --</option>';
              capSelect.disabled = true;
            }

            // 5. Setup Interactive Event Observers locally
            devSelect.onchange = function () {
              statusText.style.display = 'none';
              btnClose.disabled = true;
              populateCapabilities(devicesCache, devSelect.value);
            };

            capSelect.onchange = function () {
              statusText.style.display = 'none';

              const payload = {
                target_integrator_id: activeIntegratorId,
                reflected_device_id: devSelect.value,
                reflected_capability_id: capSelect.value
              };

              window.Homey.emit('save_reflection_settings', payload)
                .then(function () {
                  console.log('Configuration successfully saved.');
                  btnClose.disabled = false;
                  statusText.style.display = 'block';
                })
                .catch(function (err) {
                  console.error('Settings write-back failed:', err);
                });
            };
          })
          .catch(function (err) {
            devSelect.innerHTML = `<option>Error initializing configuration</option>`;
            console.error("Data bridge initialization failed:", err);
          });
      }

      // Initial run on UI load
      loadSystemLandscape();

      // Trigger reload cycle when the checkbox is toggled
      filterToggle.addEventListener('change', function () {
        statusText.style.display = 'none';
        btnClose.disabled = true;
        // Feed the active dropdown selections back into the loader to preserve them
        loadSystemLandscape(devSelect.value, capSelect.value);
      });

      // Abstracted Helper
      function populateCapabilities(cache, deviceId, selectedCapId = null) {
        const targetDevice = cache[deviceId];

        capSelect.innerHTML = '<option value="" selected disabled>-- Select Metric --</option>';
        capSelect.disabled = false;

        if (!targetDevice || !targetDevice.capabilities) return;

        targetDevice.capabilities.forEach(cap => {
          const option = document.createElement('option');
          option.value = cap.id;
          option.text = cap.title;

          if (selectedCapId && cap.id === selectedCapId) {
            option.selected = true;
          }
          capSelect.add(option);
        });
      }

      btnClose.addEventListener('click', function () {
        if (typeof window.Homey.done === 'function') {
          window.Homey.done();
        }
      });
    }

    initPicker();
  </script>
</body>

</html>
