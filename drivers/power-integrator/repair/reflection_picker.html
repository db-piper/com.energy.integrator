<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8">
  <style>
    body {
      padding: 0;
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      font-size: 14px;
      background-color: transparent;
      /* Support dark mode dynamically via system preference if supported */
      color: #333;
    }

    @media (prefers-color-scheme: dark) {
      body {
        color: #f5f5f5;
      }
    }

    /* Container Wrapper constraints */
    .picker-wrapper {
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 20px;
      /* Uniform vertical spacing between major sections */
    }

    /* Native Homey typography emulations */
    .homey-title {
      font-size: 22px;
      font-weight: 600;
      margin: 0 0 4px 0;
    }

    .homey-subtitle {
      font-size: 15px;
      color: #666;
      margin: 8px 0 8px 0;
      line-height: 1.4;
    }

    @media (prefers-color-scheme: dark) {
      .homey-subtitle {
        color: #aaa;
      }
    }

    /* Form Groups: Forces vertical stacking for form segments */
    .form-group {
      display: flex;
      flex-direction: column;
      align-items: stretch;
      /* Ensures inputs stretch to full width */
      gap: 8px;
      /* Clean, tight space between label and input */
      width: 100%;
    }

    /* Labels: Forces block display behavior */
    .homey-label {
      display: block;
      /* Guarantees the dropdown drops to a new line */
      font-size: 13px !important;
      font-weight: 600 !important;
      color: #666 !important;
      text-transform: uppercase !important;
      letter-spacing: 0.5px;
      margin: 0;
    }

    @media (prefers-color-scheme: dark) {
      .homey-label {
        color: #bbb;
      }
    }

    /* Dropdown Inputs: Uniform sizing */
    .homey-select {
      display: block;
      width: 100%;
      height: 40px;
      padding: 0 12px;
      font-size: 14px;
      background-color: #fff;
      border: 1px solid #ccc;
      border-radius: 4px;
      outline: none;
      box-sizing: border-box;
      /* Includes padding in width calculation */
    }

    .homey-select:disabled {
      background-color: #f0f0f0;
      color: #999;
      cursor: not-allowed;
    }

    @media (prefers-color-scheme: dark) {
      .homey-select {
        background-color: #252525;
        border-color: #444;
        color: #fff;
      }

      .homey-select:disabled {
        background-color: #1a1a1a;
        color: #555;
      }
    }

    .action-bar {
      margin-top: 12px;
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 8px;
    }

    /* Native Homey primary action button emulation */
    .homey-button-primary {
      height: 40px;
      padding: 0 24px;
      font-size: 14px;
      font-weight: 600;
      color: #fff;
      background-color: #007aff;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      transition: background-color 0.15s ease;
    }

    .homey-button-primary:hover:not(:disabled) {
      background-color: #0063cc;
    }

    .homey-button-primary:disabled {
      background-color: #cccccc;
      color: #888;
      cursor: not-allowed;
    }

    @media (prefers-color-scheme: dark) {
      .homey-button-primary:disabled {
        background-color: #444;
        color: #777;
      }
    }

    .status-toast {
      font-size: 12px;
      color: #2ea44f;
      font-weight: 500;
      display: none;
    }
  </style>
</head>

<body>

  <div class="picker-wrapper">
    <h1 class="homey-title">Device and Capability Chooser</h1>
    <p class="homey-subtitle">Choose a <b>Device</b> and <b>Capability</b> to be the <b>Power Source</b> for this
      Integrator.</p>

    <div class="form-group">
      <label class="homey-label" for="dev-select">1. Source Device</label>
      <select id="dev-select" class="homey-select">
        <option value="">Querying available devices...</option>
      </select>
    </div>

    <div class="form-group">
      <label class="homey-label" for="cap-select">2. Source Capability</label>
      <select id="cap-select" class="homey-select" disabled>
        <option value="">-- Choose a device first --</option>
      </select>
    </div>

    <div style="display: flex; align-items: center; gap: 8px; margin: -4px 0 4px 0;">
      <input type="checkbox" id="filter-toggle" style="width: 16px; height: 16px; cursor: pointer;">
      <label for="filter-toggle" style="cursor: pointer; font-size: 13px; user-select: none;">Show only measure.power
        capabilities</label>
    </div>

    <div class="action-bar">
      <button id="btn-close" class="homey-button-primary" disabled>Save & Close</button>
      <div id="status-text" class="status-toast">Configuration committed successfully!</div>
    </div>
  </div>

  <script type="text/javascript">
    // 1. The DOM elements are the only true global constants
    const devSelect = document.getElementById('dev-select');
    const capSelect = document.getElementById('cap-select');
    const btnClose = document.getElementById('btn-close');
    const statusText = document.getElementById('status-text');
    const filterToggle = document.getElementById('filter-toggle'); // Cached element

    function initPicker() {
      if (typeof window.Homey === 'undefined') {
        setTimeout(initPicker, 50);
        return;
      }

      if (typeof window.Homey.ready === 'function') {
        window.Homey.ready();
      }

      // 2. Define the re-runnable landscape loading function
      function loadSystemLandscape(savedDeviceId = null, savedCapId = null) {
        const strictModeActive = filterToggle.checked;

        Promise.all([
          window.Homey.emit('get_current_repair_device', {}),
          window.Homey.emit('get_system_devices', { strict: strictModeActive })
        ])
          .then(function (results) {
            const identity = results[0];
            const devicesCache = results[1];

            const activeIntegratorId = identity.id;

            // Explicitly fallback if the passed values are empty or null
            const currentDeviceId = (savedDeviceId !== null && savedDeviceId !== "")
              ? savedDeviceId
              : identity.reflected_device_id;

            const currentCapId = (savedCapId !== null && savedCapId !== "")
              ? savedCapId
              : identity.reflected_capability_id;

            // 3. Populate Device Dropdown
            devSelect.innerHTML = '<option value="" selected disabled>-- Select Source Device --</option>';
            Object.keys(devicesCache).forEach(id => {
              const dev = devicesCache[id];
              const option = document.createElement('option');
              option.value = dev.id;
              option.text = dev.name + ` [${dev.zoneName}]`;

              if (currentDeviceId && dev.id === currentDeviceId) {
                option.selected = true;
              }
              devSelect.add(option);
            });

            // 4. Cascade Trigger if valid config exists
            if (currentDeviceId && devicesCache[currentDeviceId]) {
              populateCapabilities(devicesCache, currentDeviceId, currentCapId);
              btnClose.disabled = false;
            } else {
              capSelect.innerHTML = '<option value="" selected disabled>-- Choose a device first --</option>';
              capSelect.disabled = true;
            }

            // 5. Setup Interactive Event Observers locally
            devSelect.onchange = function () {
              statusText.style.display = 'none';
              btnClose.disabled = true;
              populateCapabilities(devicesCache, devSelect.value);
            };

            capSelect.onchange = function () {
              statusText.style.display = 'none';

              const payload = {
                target_integrator_id: activeIntegratorId,
                reflected_device_id: devSelect.value,
                reflected_capability_id: capSelect.value
              };

              window.Homey.emit('save_reflection_settings', payload)
                .then(function () {
                  console.log('Configuration successfully saved.');
                  btnClose.disabled = false;
                  statusText.style.display = 'block';
                })
                .catch(function (err) {
                  console.error('Settings write-back failed:', err);
                });
            };
          })
          .catch(function (err) {
            devSelect.innerHTML = `<option>Error initializing configuration</option>`;
            console.error("Data bridge initialization failed:", err);
          });
      }

      // Initial run on UI load
      loadSystemLandscape();

      // Trigger reload cycle when the checkbox is toggled
      filterToggle.addEventListener('change', function () {
        statusText.style.display = 'none';
        btnClose.disabled = true;
        // Feed the active dropdown selections back into the loader to preserve them
        loadSystemLandscape(devSelect.value, capSelect.value);
      });

      // Abstracted Helper
      function populateCapabilities(cache, deviceId, selectedCapId = null) {
        const targetDevice = cache[deviceId];

        capSelect.innerHTML = '<option value="" selected disabled>-- Select Metric --</option>';
        capSelect.disabled = false;

        if (!targetDevice || !targetDevice.capabilities) return;

        targetDevice.capabilities.forEach(cap => {
          const option = document.createElement('option');
          option.value = cap.id;
          option.text = cap.title;

          if (selectedCapId && cap.id === selectedCapId) {
            option.selected = true;
          }
          capSelect.add(option);
        });
      }

      btnClose.addEventListener('click', function () {
        if (typeof window.Homey.done === 'function') {
          window.Homey.done();
        }
      });
    }

    initPicker();
  </script>
</body>

</html>
