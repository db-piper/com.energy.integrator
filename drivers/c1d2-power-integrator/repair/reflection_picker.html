<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8">
  <link rel="stylesheet" href="/app/com.energy.integrator/assets/css/app.css">
</head>

<body>

  <div class="picker-wrapper">
    <h1 class="homey-title">Device and Capability Chooser</h1>
    <p class="homey-subtitle">Choose a <b>Device</b> and <b>Capability</b> to be the <b>Power Source</b> for this
      Integrator.</p>

    <div class="form-group">
      <label class="homey-label" for="dev-select">1. Source Device</label>
      <select id="dev-select" class="homey-select">
        <option value="">Querying available devices...</option>
      </select>
    </div>

    <div class="form-group">
      <label class="homey-label" for="cap-select">2. Source Capability</label>
      <select id="cap-select" class="homey-select" disabled>
        <option value="">-- Choose a device first --</option>
      </select>
    </div>

    <div class="toggle-group">
      <input type="checkbox" id="filter-toggle" class="toggle-input">
      <label for="filter-toggle" class="toggle-label">Show only measure.power
        capabilities</label>
    </div>

    <div class="toggle-group">
      <input type="checkbox" id="invert-toggle" class="toggle-input">
      <label  for="invert-toggle" class="toggle-label">Invert +/- Power</label>
    </div>

    <div class="action-bar">
      <button id="btn-close" class="homey-button-primary" disabled>Save & Close</button>
      <div id="status-text" class="status-toast">Configuration committed successfully!</div>
    </div>
  </div>

<script type="text/javascript">
    // ==========================================
    // PART 1: Shared Stateless Bridge Helper
    // ==========================================
    function createHomeyPickerBridge({ onReadLiveSelection, onRender }) {
      if (typeof window.Homey === 'undefined') {
        setTimeout(() => createHomeyPickerBridge({ onReadLiveSelection, onRender }), 50);
        return;
      }

      if (typeof window.Homey.ready === 'function') {
        window.Homey.ready();
      }

      function syncLandscape() {
        const { savedDeviceId, savedCapId, strictMode, invertPower } = onReadLiveSelection();

        window.Homey.emit('get_current_device', {})
          .then(identity => {
            const targetDevId = savedDeviceId || identity.reflected_device_id;
            const targetCapId = savedCapId || identity.reflected_capability_id;
            const targetInvert = invertPower !== null ? invertPower : (identity.invert_power_sign || false);

            return window.Homey.emit('get_system_devices', {
              strict: strictMode,
              currentDeviceId: targetDevId,
              currentCapabilityId: targetCapId
            }).then(devicesCache => ({ identity, devicesCache, targetDevId, targetCapId, targetInvert }));
          })
          .then(context => {
            onRender(context);
          })
          .catch(err => {
            console.error("Homey Picker Bridge execution failure:", err);
          });
      }

      syncLandscape();
      return { refresh: syncLandscape };
    }

// ==========================================
    // PART 2: Local UI Logic Implementation
    // ==========================================
    const devSelect = document.getElementById('dev-select');
    const capSelect = document.getElementById('cap-select');
    const btnClose = document.getElementById('btn-close');
    const statusText = document.getElementById('status-text');
    const filterToggle = document.getElementById('filter-toggle');
    const invertToggle = document.getElementById('invert-toggle');

    // Keep a local pointer to the active identity context for background saving
    let currentIdentity = null;

    // Unified Write-Back Handler
    function commitSettings() {
      if (!devSelect.value || !capSelect.value || !currentIdentity) return;
      
      statusText.style.display = 'none';
      
      window.Homey.emit('save_reflection_settings', {
        target_integrator_id: currentIdentity.id,
        reflected_device_id: devSelect.value,
        reflected_capability_id: capSelect.value,
        invert_power_sign: invertToggle.checked,
      })
      .then(() => { 
        statusText.style.display = 'block'; 
      })
      .catch(err => console.error('Write-back failed:', err));
    }

    const bridge = createHomeyPickerBridge({
      
      onReadLiveSelection: () => ({
        savedDeviceId: devSelect.value || null,
        savedCapId: capSelect.value || null,
        strictMode: filterToggle.checked,
        invertPower: devSelect.value ? invertToggle.checked : null,
      }),

      onRender: ({ identity, devicesCache, targetDevId, targetCapId, targetInvert }) => {
        // Cache the identity globally so our event listeners can access identity.id safely
        currentIdentity = identity;

        // Only snap the checkbox state if the user hasn't explicitly clicked it yet
        invertToggle.checked = !!targetInvert;

        // 1. Populate Device Dropdown
        devSelect.innerHTML = '<option value="" selected disabled>-- Select Source Device --</option>';
        Object.keys(devicesCache).forEach(id => {
          const dev = devicesCache[id];
          const option = new Option(dev.name + ` [${dev.zoneName}]`, dev.id);
          if (targetDevId && dev.id === targetDevId) option.selected = true;
          devSelect.add(option);
        });

        // 2. Handle Cascading Capabilities Dropdown
        const targetDevice = devicesCache[targetDevId];
        if (targetDevId && targetDevice) {
          capSelect.innerHTML = '<option value="" selected disabled>-- Select Metric --</option>';
          capSelect.disabled = false;
          
          (targetDevice.capabilities || []).forEach(cap => {
            const option = new Option(cap.title, cap.id);
            if (targetCapId && cap.id === targetCapId) option.selected = true;
            capSelect.add(option);
          });
          btnClose.disabled = false;
        } else {
          capSelect.innerHTML = '<option value="" selected disabled>-- Choose a device first --</option>';
          capSelect.disabled = true;
          btnClose.disabled = true;
        }

        // 3. UI Element Interaction Overrides
        devSelect.onchange = () => {
          statusText.style.display = 'none';
          bridge.refresh();
        };

        // If they change the capability dropdown, commit it immediately
        capSelect.onchange = () => {
          commitSettings();
        };
      }
    });

    // 4. Global static UI triggers
    filterToggle.addEventListener('change', () => bridge.refresh());
    
    // When the invert checkbox changes, commit the setting to the backend immediately
    invertToggle.addEventListener('change', () => {
      commitSettings();
    });
    
    btnClose.addEventListener('click', () => window.Homey.done?.());  </script>
</body>

</html>
